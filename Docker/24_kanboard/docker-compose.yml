services:
  nginx:
    image: nginx:alpine
    container_name: kanboard-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker_env/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kanboard
    networks:
      - kanboard_net
    restart: unless-stopped

  kanboard:
    image: kanboard/kanboard:v1.2.49
    # image: kanboard/kanboard:latest
    # image: kanboard/kanboard:nightly
    container_name: kanboard
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db/${DB_NAME}
    depends_on:
      - db
    networks:
      - kanboard_net
    restart: unless-stopped

  db:
    image: postgres:16.4
    container_name: kanboard-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./kanboard_db:/var/lib/postgresql/data
    networks:
      - kanboard_net
    restart: unless-stopped

  adminer:
    image: adminer:5.4.1
    container_name: kanboard-adminer
    ports:
      - "8087:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    volumes:
      - ./docker_env/adminer/adminer-dark.css:/var/www/html/adminer-dark.css:ro
    depends_on:
      - db
    networks:
      - kanboard_net
    restart: unless-stopped

networks:
  kanboard_net:

volumes:
  kanboard_db:
